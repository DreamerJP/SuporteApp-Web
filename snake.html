<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Snake - Reborn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #050510;
        background-image: url("assets/SnakeAssets/Imagens/background.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        font-family: "Outfit", sans-serif;
        user-select: none;
      }
      canvas {
        display: block;
      }

      /* Efeito de Vidro e Sci-Fi para Overlays */
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 30px;
        box-sizing: border-box;
        z-index: 50;
      }

      #start-screen-overlay,
      #game-over-overlay,
      #pause-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          circle,
          rgba(10, 15, 30, 0.4) 0%,
          rgba(5, 5, 15, 0.9) 100%
        );
        backdrop-filter: blur(8px);
        z-index: 100;
      }

      #start-screen-overlay {
        display: flex;
      }

      .overlay-content {
        background: rgba(15, 25, 45, 0.7);
        padding: 60px;
        border: 1px solid rgba(0, 255, 204, 0.3);
        border-radius: 2px; /* Cantos retos para visual mais técnico */
        box-shadow:
          0 0 50px rgba(0, 0, 0, 0.5),
          inset 0 0 20px rgba(0, 255, 204, 0.1);
        text-align: center;
        position: relative;
        overflow: hidden;
        min-width: 400px;
        pointer-events: auto;
      }

      /* Decoração Industrial */
      .overlay-content::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #00ffcc, transparent);
      }

      h1 {
        font-family: "Orbitron", sans-serif;
        margin: 0;
        font-size: 64px;
        font-weight: 900;
        letter-spacing: 8px;
        color: #fff;
        text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        text-transform: uppercase;
      }

      .subtitle {
        font-family: "Orbitron", sans-serif;
        color: #00ffcc;
        font-size: 14px;
        letter-spacing: 5px;
        margin-bottom: 40px;
        opacity: 0.8;
      }

      .slogan {
        color: rgba(255, 255, 255, 0.6);
        font-style: italic;
        margin-bottom: 40px;
        font-weight: 300;
      }

      .btn {
        background: rgba(0, 255, 204, 0.05);
        color: #00ffcc;
        border: 1px solid #00ffcc;
        padding: 15px 40px;
        font-family: "Orbitron", sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
        margin: 10px 0;
        width: 100%;
        display: block;
      }

      .btn:hover {
        background: #00ffcc;
        color: #050510;
        box-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
        transform: scale(1.02);
      }

      /* Linha de Scanline animada no botão */
      .btn::after {
        content: "";
        position: absolute;
        top: -100%;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: none;
      }
      .btn:hover::after {
        top: 100%;
        transition: top 0.6s;
      }

      #score-board {
        font-family: "Orbitron", sans-serif;
        color: #00ffcc;
        text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        position: absolute;
        pointer-events: none;
        text-align: center;
      }
      #score-board .label {
        font-size: 14px;
        letter-spacing: 3px;
        opacity: 0.7;
      }
      #score-value {
        font-size: 38px;
        font-weight: 900;
      }

      #mute-btn {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 45px;
        height: 45px;
        background: rgba(0, 255, 204, 0.1);
        border: 1px solid rgba(0, 255, 204, 0.3);
        color: #00ffcc;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 20px;
        transition: all 0.3s;
        pointer-events: auto;
        z-index: 200;
      }
      #mute-btn:hover {
        background: rgba(0, 255, 204, 0.2);
        box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        transform: scale(1.1);
      }

      #controls-hint {
        color: #00ffcc;
        font-family: "Orbitron", sans-serif;
        text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        position: absolute;
        pointer-events: none;
        text-align: center;
      }
      #controls-hint .label {
        font-size: 14px;
        letter-spacing: 3px;
        opacity: 0.7;
        margin-bottom: 10px;
      }
      .hint-item {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 5px;
        letter-spacing: 1px;
      }

      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(-2px, 2px);
        }
        40% {
          transform: translate(-2px, -2px);
        }
        60% {
          transform: translate(2px, 2px);
        }
        80% {
          transform: translate(2px, -2px);
        }
        100% {
          transform: translate(0);
        }
      }

      .glitch:hover {
        animation: glitch 0.3s infinite;
      }
      #high-scores-list {
        list-style: none;
        padding: 0;
        margin: 20px 0;
        text-align: left;
        width: 100%;
      }
      #high-scores-list li {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      #player-name-input {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid #00ffcc;
        color: white;
        padding: 8px;
        width: 100%;
        margin-top: 10px;
        margin-bottom: 10px;
        box-sizing: border-box;
        display: none;
        font-family: inherit;
      }
      #boost-container {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
      }
      .boost-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 12px;
        border: 2px solid white;
        opacity: 0;
        transition: opacity 0.3s;
      }
      #debug-info {
        position: absolute;
        bottom: 10px;
        right: 10px;
        font-family: monospace;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
        text-align: right;
      }

      /* Skin Selector */
      .skin-selector {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 25px;
        margin-bottom: 25px;
        flex-wrap: wrap;
      }
      .skin-option {
        width: 60px;
        height: 60px;
        border: 2px solid rgba(0, 255, 204, 0.3);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.3);
        overflow: hidden;
        position: relative;
      }
      .skin-option:hover {
        border-color: rgba(0, 255, 204, 0.8);
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
      }
      .skin-option.active {
        border-color: #00ffcc;
        background: rgba(0, 255, 204, 0.1);
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
      }
      .skin-option img {
        width: 100%;
        height: auto;
        image-rendering: pixelated;
        transform: scale(2.5) rotate(-45deg);
      }
      .skin-label {
        font-family: "Orbitron", sans-serif;
        font-size: 10px;
        color: #00ffcc;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
      <div id="boost-container">
        <div
          id="boost-speed"
          class="boost-icon"
          style="
            background: rgba(0, 255, 255, 0.2);
            border-color: #00ffff;
            color: #00ffff;
            display: none;
          "
        >
          ⚡
        </div>
        <div
          id="boost-immortal"
          class="boost-icon"
          style="
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            color: #ffd700;
            display: none;
          "
        >
          🛡️
        </div>
      </div>
      <div id="score-board">
        <div class="label">SCORE</div>
        <div id="score-value">0</div>
      </div>
      <div id="controls-hint">
        <div class="label">DICAS</div>
        <div class="hint-item">SETAS / WASD</div>
        <div class="hint-item">ESPAÇO: PAUSE</div>
      </div>
      <div id="mute-btn" onclick="toggleMute()" title="Alternar Som">🔊</div>
    </div>

    <!-- Pause Overlay -->
    <div id="pause-overlay">
      <h1
        style="
          color: white;
          font-size: 48px;
          text-shadow: 0 0 20px cyan;
          letter-spacing: 5px;
        "
      >
        PAUSADO
      </h1>
    </div>

    <!-- Start Screen -->
    <div id="start-screen-overlay">
      <div class="overlay-content">
        <div class="subtitle">DEEP SPACE</div>
        <h1 class="glitch">COSMIC SNAKE</h1>
        <p class="slogan">Domine o vácuo. Consuma os mundos.</p>

        <div class="skin-label">Select your vessel</div>
        <div class="skin-selector" id="skin-selector">
          <!-- Options added via JS -->
        </div>

        <button class="btn" onclick="startGame()">INITIATE MISSION</button>
        <button
          class="btn"
          style="border-color: rgba(0, 255, 204, 0.3); opacity: 0.8"
          onclick="showHighScoresFromMenu()"
        >
          RANKING GLOBAL
        </button>
        <div id="menu-high-scores" style="display: none; margin-top: 20px">
          <h3
            style="
              color: #00ffcc;
              border-bottom: 1px solid #00ffcc;
              padding-bottom: 5px;
            "
          >
            TOP 5
          </h3>
          <ul
            id="menu-high-scores-list"
            style="list-style: none; padding: 0; text-align: left"
          ></ul>
          <button
            class="btn"
            style="font-size: 14px; padding: 5px 10px; margin-top: 15px"
            onclick="hideHighScoresFromMenu()"
          >
            Voltar
          </button>
        </div>
      </div>
    </div>

    <div id="game-over-overlay">
      <div class="overlay-content">
        <h1>GAME OVER</h1>
        <p style="font-size: 24px; color: #aaa">
          Score Final:
          <span id="final-score" style="color: white; font-weight: bold"
            >0</span
          >
        </p>
        <div id="high-score-section" style="display: none">
          <p style="color: #ffd700; margin: 10px 0">🌟 NOVO RECORDE! 🌟</p>
          <input
            type="text"
            id="player-name-input"
            placeholder="Digite seu nome"
            maxlength="10"
          />
          <button class="btn" onclick="saveScore()">Salvar Recorde</button>
        </div>
        <div id="high-scores-display">
          <h3>🏆 Melhores Pilotos</h3>
          <ul id="high-scores-list"></ul>
        </div>
        <button class="btn" onclick="restartGame()">Jogar Novamente</button>
        <button
          class="btn"
          style="
            margin-top: 5px;
            font-size: 14px;
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.6);
          "
          onclick="goToMenu()"
        >
          Voltar ao Menu
        </button>
      </div>
    </div>
    <div id="debug-info">FPS: --</div>

    <script>
      const CONFIG = {
        gridSize: 30,
        cols: 20,
        rows: 20,
        starCount: 200,
        baseSpeed: 100,
        colors: {
          bg: "transparent",
          boardBorder: "#00ffcc",
          snakeHead: "#00ffcc",
          snakeBody: "#00ccaa",
          snakeGlow: "rgba(0, 255, 204, 0.5)",
          text: "#ffffff",
        },
      };

      class Particle {
        constructor(x, y, color) {
          this.x = x;
          this.y = y;
          this.vx = (Math.random() - 0.5) * 8;
          this.vy = (Math.random() - 0.5) * 8;
          this.alpha = 1;
          this.color = color;
          this.size = Math.random() * 3 + 1;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.alpha -= 0.02;
        }
        draw(ctx) {
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.fillStyle = this.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = this.color;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      let width, height;
      let boardX, boardY, boardW, boardH;
      let lastTime = 0;
      let frameCount = 0;
      let fpsLastTime = 0;
      let currentFps = 0;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;

        boardW = CONFIG.cols * CONFIG.gridSize;
        boardH = CONFIG.rows * CONFIG.gridSize;
        boardX = (width - boardW) / 2;
        boardY = (height - boardH) / 2;

        // Reposiciona Elementos da UI baseados no Board
        const scoreBoard = document.getElementById("score-board");
        scoreBoard.style.left = `${boardX - 150}px`; // Flanco esquerdo (movido mais para a esquerda)
        scoreBoard.style.top = `${boardY + boardH / 2 - 40}px`;

        const controlsHint = document.getElementById("controls-hint");
        controlsHint.style.right = `${width - (boardX + boardW) - 150}px`; // Flanco direito (simétrico ao score)
        controlsHint.style.top = `${boardY + boardH / 2 - 60}px`;
        controlsHint.style.width = `120px`;
        controlsHint.style.left = "auto";

        const boostContainer = document.getElementById("boost-container");
        boostContainer.style.right = `${width - (boardX + boardW) - 150}px`;
        boostContainer.style.top = `${boardY + boardH / 2 + 30}px`;
        boostContainer.style.left = "auto";
        boostContainer.style.justifyContent = "center";
      }
      window.addEventListener("resize", resize);
      resize();

      class Star {
        constructor() {
          this.reset();
        }
        reset() {
          // Coordenadas agora são relativas ao board (20x20 slots * gridSize)
          this.x = Math.random() * (CONFIG.cols * CONFIG.gridSize);
          this.y = Math.random() * (CONFIG.rows * CONFIG.gridSize);
          this.size = Math.random() * 1.5;
          this.baseOpacity = 0.2 + Math.random() * 0.6;
          this.opacity = this.baseOpacity;
          this.twinkling = false;
          this.twinkleFactor = 0;
          this.twinkleSpeed = 0;
          this.nextTwinkleTime = Math.random() * 200;
        }
        update() {
          if (this.twinkling) {
            this.twinkleFactor += this.twinkleSpeed;
            this.opacity =
              this.baseOpacity + Math.sin(this.twinkleFactor) * 1.0;
            if (this.twinkleFactor > Math.PI) {
              this.twinkling = false;
              this.opacity = this.baseOpacity;
              this.nextTwinkleTime = Math.random() * 300 + 200;
            }
          } else {
            this.nextTwinkleTime--;
            if (this.nextTwinkleTime <= 0) {
              if (Math.random() > 0.97) {
                this.twinkling = true;
                this.twinkleFactor = 0;
                this.twinkleSpeed = 0.02 + Math.random() * 0.05;
              } else {
                this.nextTwinkleTime = 80;
              }
            }
          }
        }
        draw(ctx) {
          // O ctx já virá transladado para boardX, boardY
          ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(this.opacity)})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      const stars = Array.from({ length: CONFIG.starCount }, () => new Star());

      function drawBackground() {
        // Limpa o canvas permitindo que o background CSS ou imagem externa apareça
        ctx.clearRect(0, 0, width, height);

        // Desenha a área do jogo (Board)
        ctx.save();
        ctx.translate(boardX, boardY);

        // Estrelas apenas no board (desenhadas sobre o background.jpg)
        stars.forEach((star) => {
          star.update();
          star.draw(ctx);
        });

        // Bordas do board
        ctx.strokeStyle = CONFIG.colors.boardBorder;
        ctx.lineWidth = 3;
        ctx.strokeRect(0, 0, boardW, boardH);

        // Brilho da borda
        ctx.shadowBlur = 20;
        ctx.shadowColor = CONFIG.colors.boardBorder;
        ctx.strokeRect(0, 0, boardW, boardH);

        ctx.restore();
      }

      class Planet {
        constructor(x, y, type) {
          this.x = x;
          this.y = y;
          this.type = type;
          this.radius = CONFIG.gridSize / 2 - 2;
          this.rotation = Math.random() * Math.PI * 2;
          this.rotationSpeed = 0.005 + Math.random() * 0.01;
          this.pulse = Math.random() * Math.PI * 2;
        }
        update() {
          this.rotation += this.rotationSpeed;
          this.pulse += 0.03;
        }
        draw(ctx) {
          ctx.save();
          const screenX =
            boardX + this.x * CONFIG.gridSize + CONFIG.gridSize / 2;
          const screenY =
            boardY + this.y * CONFIG.gridSize + CONFIG.gridSize / 2;

          const bobX = Math.cos(this.pulse) * 2;
          const bobY = Math.sin(this.pulse) * 2;

          ctx.translate(screenX + bobX, screenY + bobY);

          const haloSize = this.radius * 2.5;
          const gradientHalo = ctx.createRadialGradient(
            0,
            0,
            0,
            0,
            0,
            haloSize,
          );
          const colors = [
            "rgba(0, 150, 255, 0.3)",
            "rgba(255, 100, 0, 0.3)",
            "rgba(100, 255, 150, 0.3)",
            "rgba(200, 150, 255, 0.3)",
            "rgba(255, 200, 0, 0.3)",
            "rgba(0, 255, 255, 0.3)",
            "rgba(255, 0, 255, 0.3)",
          ];
          gradientHalo.addColorStop(0, colors[this.type % colors.length]);
          gradientHalo.addColorStop(1, "rgba(0, 0, 0, 0)");

          ctx.globalCompositeOperation = "screen";
          ctx.fillStyle = gradientHalo;
          ctx.beginPath();
          ctx.arc(0, 0, haloSize, 0, Math.PI * 2);
          ctx.fill();

          // Reset composite operation
          ctx.globalCompositeOperation = "source-over";

          ctx.rotate(this.rotation);

          const pulseScale = 1 + Math.sin(this.pulse) * 0.05;
          ctx.scale(pulseScale, pulseScale);

          const planetImg = assets.planets[this.type];
          if (planetImg && planetImg.complete && planetImg.naturalWidth > 0) {
            const size = this.radius * 3.2;
            ctx.drawImage(planetImg, -size / 2, -size / 2, size, size);

            ctx.globalCompositeOperation = "overlay";
            const lightGrad = ctx.createRadialGradient(
              -size / 4,
              -size / 4,
              0,
              0,
              0,
              size / 2,
            );
            lightGrad.addColorStop(0, "rgba(255, 255, 255, 0.4)");
            lightGrad.addColorStop(1, "rgba(0, 0, 0, 0)");
            ctx.fillStyle = lightGrad;
            ctx.arc(0, 0, size / 2.1, 0, Math.PI * 2);
            ctx.fill();
          } else {
            // Fallback elegante caso a imagem falhe
            const gradient = ctx.createRadialGradient(
              -5,
              -5,
              0,
              0,
              0,
              this.radius,
            );
            switch (this.type) {
              case 0:
                gradient.addColorStop(0, "#aaddff");
                gradient.addColorStop(1, "#004488");
                break;
              case 1:
                gradient.addColorStop(0, "#ffaa88");
                gradient.addColorStop(1, "#882200");
                break;
              case 2:
                gradient.addColorStop(0, "#88ffaa");
                gradient.addColorStop(1, "#004422");
                break;
              case 3:
                gradient.addColorStop(0, "#ddaa88");
                gradient.addColorStop(1, "#553311");
                break;
              case 4:
                gradient.addColorStop(0, "#ffffaa");
                gradient.addColorStop(1, "#888800");
                break;
              case 5:
                gradient.addColorStop(0, "#aaffff");
                gradient.addColorStop(1, "#008888");
                break;
              case 6:
                gradient.addColorStop(0, "#ffaaff");
                gradient.addColorStop(1, "#880088");
                break;
            }
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      class Boost {
        constructor(x, y, type) {
          this.x = x;
          this.y = y;
          this.type = type;
          this.radius = CONFIG.gridSize / 2;
          this.pulse = 0;
          // Temporizador de desaparecimento (10s para velocidade, 15s para outros)
          this.lifetime = type === "speed" ? 10000 : 15000;
        }
        update(deltaTime) {
          this.pulse += 0.1;
          if (this.lifetime !== Infinity) {
            this.lifetime -= deltaTime;
          }
        }
        draw(ctx) {
          if (this.lifetime < 3000 && Math.floor(Date.now() / 100) % 2 === 0)
            return;

          const screenX =
            boardX + this.x * CONFIG.gridSize + CONFIG.gridSize / 2;
          const screenY =
            boardY + this.y * CONFIG.gridSize + CONFIG.gridSize / 2;
          const scale = 1 + Math.sin(this.pulse) * 0.2;
          ctx.save();
          ctx.translate(screenX, screenY);
          ctx.scale(scale, scale);
          ctx.shadowBlur = 20;

          if (this.type === "speed") {
            ctx.fillStyle = "#00ffff";
            ctx.shadowColor = "#00ffff";
            ctx.beginPath();
            ctx.moveTo(-5, -10);
            ctx.lineTo(5, -2);
            ctx.lineTo(0, 0);
            ctx.lineTo(8, 10);
            ctx.lineTo(-2, 2);
            ctx.lineTo(3, 0);
            ctx.closePath();
            ctx.fill();
          } else if (this.type === "immortal") {
            ctx.fillStyle = "#ffd700";
            ctx.shadowColor = "#ffd700";
            ctx.rotate(this.pulse * 0.5);
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
              ctx.lineTo(
                Math.cos(((18 + i * 72) / 180) * Math.PI) * 10,
                -Math.sin(((18 + i * 72) / 180) * Math.PI) * 10,
              );
              ctx.lineTo(
                Math.cos(((54 + i * 72) / 180) * Math.PI) * 5,
                -Math.sin(((54 + i * 72) / 180) * Math.PI) * 5,
              );
            }
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.fillStyle = "#ff00ff";
            ctx.shadowColor = "#ff00ff";
            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.lineTo(8, 0);
            ctx.lineTo(0, 10);
            ctx.lineTo(-8, 0);
            ctx.closePath();
            ctx.fill();

            // Detalhe interno do cristal
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-8, 0);
            ctx.lineTo(8, 0);
            ctx.moveTo(0, -10);
            ctx.lineTo(0, 10);
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      const assets = {
        skins: Array.from({ length: 5 }, () => new Image()),
        planets: Array.from({ length: 7 }, () => new Image()),
        isLoaded: false,
        audio: {
          eat: new Audio("assets/SnakeAssets/Audio/eat.mp3"),
          boost: new Audio("assets/SnakeAssets/Audio/boost.mp3"),
          gameover: new Audio("assets/SnakeAssets/Audio/gameover.mp3"),
          victory: new Audio("assets/SnakeAssets/Audio/victory.mp3"),
          start: new Audio("assets/SnakeAssets/Audio/start.mp3"),
          select: new Audio("assets/SnakeAssets/Audio/select.mp3"),
        },
      };

      assets.skins.forEach((img, i) => {
        const name = i === 0 ? "Snake" : `Snake${i}`;
        img.src = `assets/SnakeAssets/Imagens/${name}.PNG`;
        img.onload = () => {
          if (i === 0) assets.isLoaded = true;
          updateSkinUI();
        };
      });

      assets.planets.forEach((img, i) => {
        img.src = `assets/SnakeAssets/Imagens/planet_${i}.png`;
      });

      function updateSkinUI() {
        const container = document.getElementById("skin-selector");
        if (!container) return;
        container.innerHTML = "";
        assets.skins.forEach((skin, i) => {
          const div = document.createElement("div");
          div.className = `skin-option ${Game.selectedSkinIndex === i ? "active" : ""}`;
          div.onclick = () => selectSkin(i);

          const img = document.createElement("img");
          img.src = skin.src;
          div.appendChild(img);
          container.appendChild(div);
        });
      }

      function selectSkin(index) {
        Game.selectedSkinIndex = index;
        localStorage.setItem("snake_selected_skin", index);
        playSfx("select");
        updateSkinUI();
      }

      let isMuted = false;
      function toggleMute() {
        isMuted = !isMuted;
        document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
      }

      function playSfx(key) {
        if (isMuted) return;
        const sound = assets.audio[key];
        if (sound) {
          sound.currentTime = 0;
          sound.play().catch(() => {});
        }
      }

      const Game = {
        snake: [],
        direction: { x: 1, y: 0 },
        nextDirection: { x: 1, y: 0 },
        planets: [],
        boosts: [],
        particles: [],
        score: 0,
        highScores: [],
        gameOver: false,
        isPlaying: false,
        isPaused: false,
        timeSinceLastMove: 0,
        moveInterval: CONFIG.baseSpeed,
        activeBoosts: { speed: 0, immortal: 0 },
        selectedSkinIndex:
          parseInt(localStorage.getItem("snake_selected_skin")) || 0,

        init() {
          this.snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 },
          ];
          this.prevSnake = this.snake.map((s) => ({ ...s }));
          this.direction = { x: 1, y: 0 };
          this.nextDirection = { x: 1, y: 0 };
          this.score = 0;
          this.gameOver = false;
          this.isPaused = false;
          this.planets = [];
          this.boosts = [];
          this.particles = [];
          this.activeBoosts = { speed: 0, immortal: 0 };
          const saved = localStorage.getItem("snake_highscores");
          if (saved) this.highScores = JSON.parse(saved);
          for (let i = 0; i < 3; i++) this.spawnPlanet();
          document.getElementById("score-value").innerText = this.score;
          document.getElementById("game-over-overlay").style.display = "none";
          document.getElementById("pause-overlay").style.display = "none";
        },

        spawnPlanet() {
          if (this.snake.length >= CONFIG.cols * CONFIG.rows) return;
          let x,
            y,
            valid,
            attempts = 0;
          do {
            x = Math.floor(Math.random() * CONFIG.cols);
            y = Math.floor(Math.random() * CONFIG.rows);
            valid = !this.snake.some((s) => s.x === x && s.y === y);
            attempts++;
          } while (!valid && attempts < 100);
          if (valid)
            this.planets.push(
              new Planet(
                x,
                y,
                Math.floor(Math.random() * assets.planets.length),
              ),
            );
        },

        spawnBoost() {
          if (Math.random() > 0.1) return;
          let x, y, valid;
          do {
            x = Math.floor(Math.random() * CONFIG.cols);
            y = Math.floor(Math.random() * CONFIG.rows);
            valid =
              !this.snake.some((s) => s.x === x && s.y === y) &&
              !this.planets.some((p) => p.x === x && p.y === y);
          } while (!valid);
          const types = ["speed", "immortal", "score"];
          this.boosts.push(
            new Boost(x, y, types[Math.floor(Math.random() * 3)]),
          );
        },

        update(deltaTime) {
          if (this.gameOver) return;
          if (!this.isPaused) {
            this.planets.forEach((p) => p.update());
            this.boosts.forEach((b) => b.update(deltaTime));
            this.particles.forEach((p) => p.update());

            this.boosts = this.boosts.filter((b) => b.lifetime > 0);
            this.particles = this.particles.filter((p) => p.alpha > 0);
          }
          if (!this.isPlaying || this.isPaused) return;

          if (this.activeBoosts.speed > 0) {
            this.activeBoosts.speed -= deltaTime;
            this.moveInterval = CONFIG.baseSpeed / 2;
          } else {
            this.moveInterval = CONFIG.baseSpeed;
          }
          if (this.activeBoosts.immortal > 0)
            this.activeBoosts.immortal -= deltaTime;

          this.timeSinceLastMove += deltaTime;
          if (this.timeSinceLastMove >= this.moveInterval) {
            this.timeSinceLastMove = 0;
            this.move();
          }
        },

        togglePause() {
          if (!this.isPlaying || this.gameOver) return;
          this.isPaused = !this.isPaused;
          document.getElementById("pause-overlay").style.display = this.isPaused
            ? "flex"
            : "none";
        },

        createExplosion(x, y, color, count = 15) {
          const screenX = boardX + x * CONFIG.gridSize + CONFIG.gridSize / 2;
          const screenY = boardY + y * CONFIG.gridSize + CONFIG.gridSize / 2;
          for (let i = 0; i < count; i++) {
            this.particles.push(new Particle(screenX, screenY, color));
          }
        },

        move() {
          this.prevSnake = this.snake.map((s) => ({ ...s }));
          this.direction = this.nextDirection;
          const head = {
            x: this.snake[0].x + this.direction.x,
            y: this.snake[0].y + this.direction.y,
          };

          if (head.x < 0) head.x = CONFIG.cols - 1;
          if (head.x >= CONFIG.cols) head.x = 0;
          if (head.y < 0) head.y = CONFIG.rows - 1;
          if (head.y >= CONFIG.rows) head.y = 0;

          if (
            this.activeBoosts.immortal <= 0 &&
            this.snake.some((s) => s.x === head.x && s.y === head.y)
          ) {
            this.endGame();
            return;
          }

          let ate = false;

          for (let i = 0; i < this.planets.length; i++) {
            if (this.planets[i].x === head.x && this.planets[i].y === head.y) {
              this.score += 100;
              this.createExplosion(head.x, head.y, "#00ffcc");
              playSfx("eat");
              this.planets.splice(i, 1);
              this.spawnPlanet();
              this.spawnBoost();
              ate = true;
              break;
            }
          }
          for (let i = 0; i < this.boosts.length; i++) {
            if (this.boosts[i].x === head.x && this.boosts[i].y === head.y) {
              const b = this.boosts[i];
              const color =
                b.type === "speed"
                  ? "#00ffff"
                  : b.type === "immortal"
                    ? "#ffd700"
                    : "#ff00ff";
              this.createExplosion(head.x, head.y, color, 25);
              playSfx("boost");

              if (b.type === "speed") this.activeBoosts.speed = 5000;
              else if (b.type === "immortal")
                this.activeBoosts.immortal = 10000;
              else this.score += 500;
              this.boosts.splice(i, 1);
              break;
            }
          }
          this.snake.unshift(head);
          if (!ate) this.snake.pop();

          if (this.snake.length >= CONFIG.cols * CONFIG.rows) {
            this.victory();
            return;
          }

          document.getElementById("score-value").innerText = this.score;
        },

        victory() {
          this.gameOver = true;
          playSfx("victory");
          document.getElementById("final-score").innerText = this.score;
          const overlay = document.getElementById("game-over-overlay");
          overlay.querySelector("h1").innerText = "VOCÊ VENCEU!";
          overlay.querySelector("h1").style.color = "#ffd700";
          overlay.style.display = "flex";
          checkHighScores(this.score);
          updateHighScoresUI();
        },

        draw(ctx) {
          this.planets.forEach((p) => p.draw(ctx));
          this.boosts.forEach((b) => b.draw(ctx));
          this.particles.forEach((p) => p.draw(ctx));

          if (this.snake.length === 0) return;

          ctx.save();
          let glowColor = CONFIG.colors.snakeGlow;
          if (this.activeBoosts.immortal > 0) {
            glowColor = "rgba(255, 215, 0, 0.7)";
            ctx.shadowBlur = 25;
          } else if (this.activeBoosts.speed > 0) {
            glowColor = "rgba(0, 255, 255, 0.7)";
            ctx.shadowBlur = 20;
          } else {
            ctx.shadowBlur = 15;
          }
          ctx.shadowColor = glowColor;

          const progress = this.isPlaying
            ? Math.min(this.timeSinceLastMove / this.moveInterval, 1)
            : 0;

          const getInterpolatedPos = (index) => {
            const curr = this.snake[index];
            const prev = this.prevSnake[index] || curr;

            let px = prev.x;
            let py = prev.y;
            let cx = curr.x;
            let cy = curr.y;

            if (Math.abs(cx - px) > 1) {
              if (cx > px) px += CONFIG.cols;
              else cx += CONFIG.cols;
            }
            if (Math.abs(cy - py) > 1) {
              if (cy > py) py += CONFIG.rows;
              else cy += CONFIG.rows;
            }

            const interX = px + (cx - px) * progress;
            const interY = py + (cy - py) * progress;

            return {
              x: boardX + interX * CONFIG.gridSize + CONFIG.gridSize / 2,
              y: boardY + interY * CONFIG.gridSize + CONFIG.gridSize / 2,
            };
          };

          const points = this.snake.map((_, i) => getInterpolatedPos(i));

          if (points.length > 1) {
            const bodyImg = assets.skins[this.selectedSkinIndex];
            const imgW = bodyImg.naturalWidth;
            const imgH = bodyImg.naturalHeight;
            const sxBody = 0,
              syBody = imgH * 0.45,
              swBody = imgW,
              shBody = imgH * 0.1;

            const hasBoost =
              this.activeBoosts.immortal > 0 || this.activeBoosts.speed > 0;

            if (hasBoost) {
              ctx.shadowColor = glowColor;
              ctx.shadowOffsetX = 0;
              ctx.shadowOffsetY = 0;
              ctx.shadowBlur = this.activeBoosts.immortal > 0 ? 30 : 25;
            } else {
              ctx.shadowColor = "rgba(0, 0, 0, 0.8)";
              ctx.shadowBlur = 10;
              ctx.shadowOffsetX = 5;
              ctx.shadowOffsetY = 5;
            }

            for (let i = 1; i < points.length - 1; i++) {
              const p = points[i];
              const prevP = points[i - 1];
              const nextP = points[i + 1];

              const distPrev = Math.hypot(p.x - prevP.x, p.y - prevP.y);
              const distNext = Math.hypot(nextP.x - p.x, nextP.y - p.y);

              let rotation;
              if (
                distPrev < CONFIG.gridSize * 2 &&
                distNext < CONFIG.gridSize * 2
              ) {
                const anglePrev = Math.atan2(p.y - prevP.y, p.x - prevP.x);
                const angleNext = Math.atan2(nextP.y - p.y, nextP.x - p.x);
                let diff = angleNext - anglePrev;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                rotation = anglePrev + diff * 0.5 + Math.PI / 2;
              } else {
                rotation =
                  Math.atan2(nextP.y - p.y, nextP.x - p.x) + Math.PI / 2;
              }

              const taperFactor = 1 - (i / points.length) * 0.4;
              const pulse = 1 + Math.sin(Date.now() / 200 + i * 0.3) * 0.05;
              const currentSize = CONFIG.gridSize * 1.5 * taperFactor * pulse;

              ctx.save();
              ctx.translate(p.x, p.y);
              ctx.rotate(rotation);

              if (assets.isLoaded) {
                ctx.drawImage(
                  bodyImg,
                  sxBody,
                  syBody,
                  swBody,
                  shBody,
                  -currentSize / 2,
                  -currentSize / 2,
                  currentSize,
                  currentSize,
                );
              } else {
                ctx.fillStyle = CONFIG.colors.snakeBody;
                ctx.beginPath();
                ctx.arc(0, 0, currentSize / 2, 0, Math.PI * 2);
                ctx.fill();
              }
              ctx.restore();
            }
          }

          // Reseta sombras
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 0;

          points.forEach((p, index) => {
            if (index !== 0 && index !== points.length - 1) return;

            let rotation = 0;
            if (index === 0) {
              const targetRotation =
                this.direction.x === 1
                  ? Math.PI / 2
                  : this.direction.x === -1
                    ? -Math.PI / 2
                    : this.direction.y === 1
                      ? Math.PI
                      : 0;

              if (points.length > 1) {
                const nextP = points[1];
                let dx = p.x - nextP.x;
                let dy = p.y - nextP.y;

                if (Math.abs(dx) > CONFIG.gridSize * 2) dx = 0;
                if (Math.abs(dy) > CONFIG.gridSize * 2) dy = 0;

                rotation = Math.atan2(dy, dx) + Math.PI / 2;
              } else {
                rotation = targetRotation;
              }
            } else {
              const pPrev = points[index - 1];
              let dx = pPrev.x - p.x;
              let dy = pPrev.y - p.y;
              if (Math.abs(dx) > CONFIG.gridSize * 2) dx = 0;
              if (Math.abs(dy) > CONFIG.gridSize * 2) dy = 0;
              rotation = Math.atan2(dy, dx) + Math.PI / 2;
            }

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(rotation);

            const taperFactor = index === 0 ? 1 : 0.6;
            const sSize = CONFIG.gridSize * 1.6 * taperFactor;

            if (assets.isLoaded) {
              const currentSkin = assets.skins[this.selectedSkinIndex];
              const imgW = currentSkin.naturalWidth;
              const imgH = currentSkin.naturalHeight;
              let sx, sy, sw, sh;

              if (index === 0) {
                sx = 0;
                sy = 0;
                sw = imgW;
                sh = imgH * 0.15;
              } else {
                sx = 0;
                sy = imgH * 0.85;
                sw = imgW;
                sh = imgH * 0.15;
              }

              ctx.drawImage(
                currentSkin,
                sx,
                sy,
                sw,
                sh,
                -sSize / 2,
                -sSize / 2,
                sSize,
                sSize,
              );
            } else {
              ctx.fillStyle =
                index === 0 ? CONFIG.colors.snakeHead : CONFIG.colors.snakeBody;
              ctx.beginPath();
              ctx.arc(0, 0, sSize / 2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          });

          ctx.restore();
        },

        endGame() {
          this.gameOver = true;
          playSfx("gameover");
          const overlay = document.getElementById("game-over-overlay");
          overlay.querySelector("h1").innerText = "GAME OVER";
          overlay.querySelector("h1").style.color = "#00ffcc";
          document.getElementById("final-score").innerText = this.score;
          overlay.style.display = "flex";
          if (checkHighScores(this.score)) {
            document.getElementById("high-score-section").style.display =
              "block";
            const inp = document.getElementById("player-name-input");
            inp.style.display = "block";
            inp.focus();
          } else {
            document.getElementById("high-score-section").style.display =
              "none";
          }
          updateHighScoresUI();
        },
      };

      function startGame() {
        document.getElementById("start-screen-overlay").style.display = "none";
        document.getElementById("game-over-overlay").style.display = "none";
        playSfx("start");
        Game.isPlaying = true;
        Game.init();
      }
      function showHighScoresFromMenu() {
        const list = document.getElementById("menu-high-scores-list");
        list.innerHTML = "";
        const saved = localStorage.getItem("snake_highscores");
        const scores = saved ? JSON.parse(saved) : [];
        if (scores.length === 0) {
          list.innerHTML = "<li style='color: #aaa;'>Sem recordes</li>";
        } else {
          scores.forEach((s, i) => {
            list.innerHTML += `<li>#${i + 1} ${s.name} <span style='color:#00ffcc'>${s.score}</span></li>`;
          });
        }
        document.getElementById("menu-high-scores").style.display = "block";
      }
      function hideHighScoresFromMenu() {
        document.getElementById("menu-high-scores").style.display = "none";
      }
      function goToMenu() {
        document.getElementById("game-over-overlay").style.display = "none";
        document.getElementById("start-screen-overlay").style.display = "flex";
        Game.isPlaying = false;
      }
      function checkHighScores(s) {
        return (
          Game.highScores.length < 5 ||
          s > Game.highScores[Game.highScores.length - 1].score
        );
      }
      function saveScore() {
        const name =
          document.getElementById("player-name-input").value.toUpperCase() ||
          "ANON";
        Game.highScores.push({ name, score: Game.score });
        Game.highScores.sort((a, b) => b.score - a.score);
        Game.highScores = Game.highScores.slice(0, 5);
        localStorage.setItem(
          "snake_highscores",
          JSON.stringify(Game.highScores),
        );
        document.getElementById("high-score-section").style.display = "none";
        updateHighScoresUI();
      }
      function updateHighScoresUI() {
        const list = document.getElementById("high-scores-list");
        list.innerHTML = "";
        Game.highScores.forEach((s, i) => {
          list.innerHTML += `<li>#${i + 1} ${s.name} <span>${s.score}</span></li>`;
        });
      }
      function restartGame() {
        document.getElementById("game-over-overlay").style.display = "none";
        Game.isPlaying = true;
        Game.init();
      }

      window.addEventListener("keydown", (e) => {
        if ([" ", "p", "P", "Escape"].includes(e.key)) {
          if (Game.isPlaying && !Game.gameOver) {
            Game.togglePause();
            return;
          }
        }
        if (!Game.isPlaying || Game.isPaused) return;
        if (["ArrowUp", "w", "W"].includes(e.key) && Game.direction.y === 0)
          Game.nextDirection = { x: 0, y: -1 };
        else if (
          ["ArrowDown", "s", "S"].includes(e.key) &&
          Game.direction.y === 0
        )
          Game.nextDirection = { x: 0, y: 1 };
        else if (
          ["ArrowLeft", "a", "A"].includes(e.key) &&
          Game.direction.x === 0
        )
          Game.nextDirection = { x: -1, y: 0 };
        else if (
          ["ArrowRight", "d", "D"].includes(e.key) &&
          Game.direction.x === 0
        )
          Game.nextDirection = { x: 1, y: 0 };
      });

      function loop(timestamp) {
        const deltaTime = timestamp - lastTime || 0;
        lastTime = timestamp;

        frameCount++;
        if (timestamp - fpsLastTime >= 1000) {
          currentFps = frameCount;
          frameCount = 0;
          fpsLastTime = timestamp;
          document.getElementById("debug-info").innerText =
            `FPS: ${currentFps}`;
        }

        drawBackground();
        Game.update(deltaTime);
        Game.draw(ctx);

        const sa = Game.activeBoosts.speed > 0;
        const ia = Game.activeBoosts.immortal > 0;

        const speedEl = document.getElementById("boost-speed");
        const immortalEl = document.getElementById("boost-immortal");

        speedEl.style.display = sa ? "flex" : "none";
        speedEl.style.opacity = sa ? 1 : 0;

        immortalEl.style.display = ia ? "flex" : "none";
        immortalEl.style.opacity = ia ? 1 : 0;

        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    </script>
  </body>
